databases:
  - name: signal-fire-db
    databaseName: signal_fire
    user: signal_fire
    plan: free

services:
  - type: web
    name: signal-fire
    runtime: ruby
    plan: free
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails assets:clean
    preDeployCommand: bundle exec rails db:migrate && bundle exec rails db:seed
    startCommand: bundle exec rails server -p $PORT -e $RAILS_ENV
    healthCheckPath: /about
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: signal-fire-db
          property: connectionString
